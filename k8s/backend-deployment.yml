apiVersion: apps/v1
kind: Deployment
metadata:
  name: intellmeet-backend
  labels:
    app: intellmeet-backend
spec:
  replicas: 2 # Yeh backend ke 2 parallel servers humesha live rakhega
  selector:
    matchLabels:
      app: intellmeet-backend
  template:
    metadata:
      labels:
        app: intellmeet-backend
    spec:
      containers:
      - name: backend-container
        image: krenilpatel05/intellmeet-backend:latest # Aapka docker hub image tag
        ports:
        - containerPort: 5000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "5000"
---
apiVersion: v1
kind: Service
metadata:
  name: intellmeet-backend-service
spec:
  type: ClusterIP # Internal routing ke liye
  selector:
    app: intellmeet-backend
  ports:
    - port: 5000
      targetPort: 5000