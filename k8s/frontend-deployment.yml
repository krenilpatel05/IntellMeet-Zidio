apiVersion: apps/v1
kind: Deployment
metadata:
  name: intellmeet-frontend
  labels:
    app: intellmeet-frontend
spec:
  replicas: 2 # Frontend ke bhi 2 pods parallel chalenge
  selector:
    matchLabels:
      app: intellmeet-frontend
  template:
    metadata:
      labels:
        app: intellmeet-frontend
    spec:
      containers:
      - name: frontend-container
        image: krenilpatel05/intellmeet-frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: intellmeet-frontend-service
spec:
  type: NodePort # Local machine ya browser par test karne ke liye access dega
  selector:
    app: intellmeet-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080 # Browser me localhost:30080 par chalane ke liye