name: IntellMeet CI/CD DevOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Setup Node.js Environment
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: './server/package.json'

    - name: Install Backend Dependencies
      run: |
        cd server
        npm install

    - name: Install Frontend Dependencies
      run: |
        cd client
        npm install

    - name: Verify Environment Parity
      run: echo "🚀 CI/CD Automated Checks Passed Successfully!"